name: "🧪 Node.js Tests"

on: [pull_request]

env:
  GITHUB_HASH: $(git rev-parse --short "$GITHUB_SHA")

jobs:
  node-integration:
    name: Node.js Integration (soft-fail)
    strategy:
      matrix:
        node-version: [20.x]
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Non-blocking: failures don't fail the workflow
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./

      - name: Run Integration Tests
        run: npm test -- --testPathIgnorePatterns=tlsfingerprint
        working-directory: ./

  node-tls-fingerprint:
    name: Node.js TLS Fingerprint
    strategy:
      matrix:
        node-version: [20.x]
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Blocking: failures fail the workflow

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Install npm dependencies
        run: npm ci
        working-directory: ./

      - name: Run TLS Fingerprint Tests
        run: npm test -- --testPathPattern=tlsfingerprint
        working-directory: ./
